name: "Okostemplom Gázleolvasó"
version: "2.0.0"
slug: "okostemplom_gazleolvaso"
description: "Többkamerás gázóra OCR – leolvasók kezelése a WebUI-ban"
startup: "application"
boot: "auto"
init: false
arch:
  - amd64
  - aarch64

map:
  - "media:rw"
  - "data:rw"

host_network: false
services:
  - mqtt:want

ingress: true
ingress_port: 8099

panel_icon: "mdi:gas-cylinder"
panel_title: "Gázleolvasó"

# Az egyedi leolvasók konfigurációját a WebUI-ban lehet kezelni.
# Az addon indításakor nincs szükség RTSP/ROI beállításokra – ezeket
# a /data/readers.json fájlban tárolja a rendszer.
#
# MQTT beállítások: ha a Supervisor automatikusan adja az MQTT credentials-t
# (Mosquitto addon telepítve + mqtt:want), akkor ezeket nem kell kitölteni.
# Ha kézzel szeretnéd megadni, add meg az mqtt_host értékét.
options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
