<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="60">
  <base href="{{ ingress_path }}/">
    <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <title>{{ number }}</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #010a01;
      font-family: "Ubuntu", sans-serif;
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: 0 0 200px rgba(0, 0, 0, 0.9) inset;
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1rem;
    }
    
    .number {
      font-family: "Ubuntu", sans-serif;
      font-weight: 700;
      color: #fff;
      letter-spacing: 35px;
      text-shadow:
   0 0 7px #fff,
   0 0 10px #fff,
   0 0 21px #fff,
   0 0 42px #0fa,
   0 0 82px #0fa,
   0 0 92px #0fa,
   0 0 102px #0fa,
   0 0 151px #0fa;
      font-size: 5rem;
      opacity: 0;
      transform: translateY(-50px);
      animation: floatFadeIn 2s ease-out forwards;
      margin: 0 0 2rem 0;
    }

    .snapshot-container {
      margin: 1.5rem auto 0 auto;
      opacity: 0;
      animation: floatFadeIn 2s ease-out 0.5s forwards;
    }

    .snapshot-label {
      color: #0fa;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      text-shadow: 0 0 7px #0fa;
    }

    .snapshot-img {
      max-width: min(640px, 90vw);
      width: 100%;
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 6px;
      box-shadow: 0 0 20px rgba(0, 255, 170, 0.15);
      display: block;
      margin: 0 auto;
    }

    .settings-link {
      margin-top: 2rem;
      display: inline-block;
    }

    .settings-link a {
      color: #0fa;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border: 1px solid #0fa;
      border-radius: 4px;
      transition: all 0.3s ease;
      text-shadow: 0 0 7px #0fa;
    }

    .settings-link a:hover {
      background: rgba(0, 255, 170, 0.1);
      box-shadow: 0 0 10px #0fa;
    }

    @keyframes floatFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="content">
    <div class="number">{{ number }}</div>
    <div class="snapshot-container">
      <div class="snapshot-label">Snapshot</div>
      <img class="snapshot-img" src="snapshot.png" alt="Kamera snapshot">
    </div>
    <div class="settings-link">
      <a href="settings">⚙️ Beállítások</a>
    </div>
  </div>
</body>
</html>
